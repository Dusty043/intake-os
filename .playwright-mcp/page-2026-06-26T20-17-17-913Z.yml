                    - paragraph [ref=e418]: Invoice delivery, payment collection, and support handling are currently manual and email-based, causing about 8 hours per week of administrative work sending PDFs and chasing payments. Clients need self-service access to invoice history, payment options, and support communication, while the business needs reduced manual effort, better payment follow-up, accurate QuickBooks records, and clearer ticket tracking.
                    - paragraph [ref=e419]: "The user is specifying a particular solution architecture and feature set: a custom portal, magic-link authentication, built-in ticketing, Stripe/QuickBooks integration, reminders, and role-based access. The underlying need may be solvable through existing customer portal, invoicing, payment, or helpdesk tools, but the request is framed as building a custom system."
                - generic [ref=e420]:
                  - paragraph [ref=e421]: Problem Frame
                  - generic [ref=e422]:
                    - paragraph [ref=e423]: The business needs a white-labeled client portal integrated with QuickBooks Online and Stripe that allows approximately 200 active client companies to securely access invoice history, download invoice PDFs, pay outstanding invoices in full, and manage support tickets. The portal must support company-level accounts with multiple contacts and role-based permissions, magic-link authentication, automated invoice reminders, QuickBooks payment record creation, ticket status tracking, threaded replies, and email notifications, in order to reduce manual administrative effort, improve payment collection, maintain accounting accuracy, and make support communication trackable.
