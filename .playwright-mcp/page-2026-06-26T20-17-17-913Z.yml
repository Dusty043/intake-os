                      - paragraph [ref=e540]: Use an off-the-shelf white-labeled client portal platform, configure client companies and contacts, connect QuickBooks Online for invoice visibility, route payments through Stripe-hosted checkout/payment pages, and use the platform’s built-in ticketing and email notifications. Automated reminders can be configured natively or via Zapier/Make.
                      - paragraph [ref=e541]: Fastest path to reduce manual invoice PDF sending and payment chasing, likely deployable in weeks with limited custom development. Most PCI scope can be avoided by using Stripe-hosted payment pages.
                      - button "Select this direction" [ref=e542] [cursor=pointer]
                    - generic [ref=e543]:
                      - generic [ref=e546]:
                        - generic [ref=e547]: Build a custom managed portal with QuickBooks, Stripe, magic links, and native ticketing
                        - generic [ref=e548]: Recommended
                        - generic [ref=e549]: medium
                      - paragraph [ref=e550]: Build a purpose-fit branded portal with managed services. Store client companies, contacts, roles, portal sessions, ticket threads, notification state, invoice cache, and payment audit records locally. Sync invoice metadata from QuickBooks Online, retrieve/download QuickBooks-generated invoice PDFs, take full-balance payments through Stripe-hosted flows, and use Stripe webhooks to create corresponding payment records in QuickBooks. Include ticket status tracking, threaded replies, magic-link login, email notifications, and scheduled invoice reminders 7 and 3 days before due date.
                      - paragraph [ref=e551]: Provides the best balance of control, compliance posture, implementation effort, and long-term maintainability. It can exactly support company accounts, multiple contacts, payer/viewer roles, QuickBooks invoice sync, PDF retrieval, Stripe full-invoice payments, automatic QuickBooks payment creation, reminders, and built-in ticket tracking.
                      - button "Select this direction" [ref=e552] [cursor=pointer]
                    - generic [ref=e553]:
                      - generic [ref=e556]:
                        - generic [ref=e557]: Hybrid portal with dedicated helpdesk backend
                        - generic [ref=e558]: medium
                      - paragraph [ref=e559]: Build the invoice/payment portal custom or low-code, but use a dedicated helpdesk system behind the scenes for tickets. Clients create and reply to tickets in the branded portal; the portal uses helpdesk APIs to create conversations, sync statuses, send threaded replies, and trigger notifications. Invoices and payments are still handled through QuickBooks Online and Stripe.
                      - paragraph [ref=e560]: Reduces the amount of custom ticket-management code while giving the support team a mature backend for assignment, internal notes, collision handling, reporting, and notification workflows. The client still sees a branded portal experience.
                      - button "Select this direction" [ref=e561] [cursor=pointer]
                    - generic [ref=e562]:
                      - generic [ref=e565]:
                        - generic [ref=e566]: Enterprise-grade event-driven portal platform
                        - generic [ref=e567]: high
                      - paragraph [ref=e568]: Create an event-driven portal platform with separate services for identity, customer/company management, QuickBooks synchronization, invoice PDF handling, Stripe payment processing, payment reconciliation, reminders, ticketing, and notifications. Use queues and idempotent event processing for all accounting and email workflows, with strong audit trails and monitoring.
                      - paragraph [ref=e569]: Maximum robustness, auditability, scalability, and operational control. Supports future needs such as multi-brand portals, advanced permissions, approvals, payment plans, SLA workflows, analytics, customer self-service knowledge base, and deeper accounting reconciliation.
