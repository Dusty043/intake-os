                - paragraph [ref=e362]: We need a client-facing portal where customers can view their invoice history, download PDFs, pay outstanding invoices via Stripe, and raise support tickets. Right now everything goes through email and the team spends about 8 hours a week manually sending PDFs and chasing payments. We have about 200 active clients. The data lives in QuickBooks.
                - paragraph [ref=e363]: 04:09 am
              - generic [ref=e496]:
                - paragraph [ref=e497]: We use QuickBooks Online. The portal should generate PDFs from QuickBooks data. Stripe payments should create records in QuickBooks automatically. Clients are companies with multiple contacts — the primary contact pays invoices, others can only view. Authentication via magic link (no passwords). No existing helpdesk — build ticket management into the portal. Tickets need status tracking, threaded replies, and email notifications. No partial payments for now. White-label with our branding and domain. PCI compliance required. Send automated reminders 7 and 3 days before due date.
