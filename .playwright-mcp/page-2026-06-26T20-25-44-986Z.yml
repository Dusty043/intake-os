                    - generic [ref=e1170]:
                      - generic [ref=e1173]:
                        - generic [ref=e1174]: Hybrid portal with dedicated helpdesk backend
                        - generic [ref=e1175]: medium
                      - paragraph [ref=e1176]: Build the invoice/payment portal custom or low-code, but use a dedicated helpdesk system behind the scenes for tickets. Clients create and reply to tickets in the branded portal; the portal uses helpdesk APIs to create conversations, sync statuses, send threaded replies, and trigger notifications. Invoices and payments are still handled through QuickBooks Online and Stripe.
                      - paragraph [ref=e1177]: Reduces the amount of custom ticket-management code while giving the support team a mature backend for assignment, internal notes, collision handling, reporting, and notification workflows. The client still sees a branded portal experience.
                      - button "Select this direction" [disabled] [ref=e1178]
                    - generic [ref=e1179]:
                      - generic [ref=e1182]:
                        - generic [ref=e1183]: Enterprise-grade event-driven portal platform
                        - generic [ref=e1184]: high
                      - paragraph [ref=e1185]: Create an event-driven portal platform with separate services for identity, customer/company management, QuickBooks synchronization, invoice PDF handling, Stripe payment processing, payment reconciliation, reminders, ticketing, and notifications. Use queues and idempotent event processing for all accounting and email workflows, with strong audit trails and monitoring.
                      - paragraph [ref=e1186]: Maximum robustness, auditability, scalability, and operational control. Supports future needs such as multi-brand portals, advanced permissions, approvals, payment plans, SLA workflows, analytics, customer self-service knowledge base, and deeper accounting reconciliation.
