                        - generic [ref=e1154]: low
                      - paragraph [ref=e1155]: Use an off-the-shelf white-labeled client portal platform, configure client companies and contacts, connect QuickBooks Online for invoice visibility, route payments through Stripe-hosted checkout/payment pages, and use the platform’s built-in ticketing and email notifications. Automated reminders can be configured natively or via Zapier/Make.
                      - paragraph [ref=e1156]: Fastest path to reduce manual invoice PDF sending and payment chasing, likely deployable in weeks with limited custom development. Most PCI scope can be avoided by using Stripe-hosted payment pages.
                      - button "Select this direction" [disabled] [ref=e1157]
                    - generic [ref=e1158]:
                      - generic [ref=e1161]:
                        - generic [ref=e1162]: Build a custom managed portal with QuickBooks, Stripe, magic links, and native ticketing
                        - generic [ref=e1163]: Recommended
                        - generic [ref=e1164]: medium
                      - paragraph [ref=e1165]: Build a purpose-fit branded portal with managed services. Store client companies, contacts, roles, portal sessions, ticket threads, notification state, invoice cache, and payment audit records locally. Sync invoice metadata from QuickBooks Online, retrieve/download QuickBooks-generated invoice PDFs, take full-balance payments through Stripe-hosted flows, and use Stripe webhooks to create corresponding payment records in QuickBooks. Include ticket status tracking, threaded replies, magic-link login, email notifications, and scheduled invoice reminders 7 and 3 days before due date.
                      - paragraph [ref=e1166]: Provides the best balance of control, compliance posture, implementation effort, and long-term maintainability. It can exactly support company accounts, multiple contacts, payer/viewer roles, QuickBooks invoice sync, PDF retrieval, Stripe full-invoice payments, automatic QuickBooks payment creation, reminders, and built-in ticket tracking.
                      - generic [ref=e1167]:
