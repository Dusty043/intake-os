                    - paragraph [ref=e1074]: Invoice delivery, payment collection, and support handling are currently email-based and manual, costing the team about 8 hours per week and creating friction for ~200 clients. The organization needs a self-service, branded client experience that reduces manual PDF sending and payment chasing, centralizes ticket communication, preserves QuickBooks Online as the financial source of truth, and keeps payment handling PCI-compliant by using Stripe-hosted checkout.
                - generic [ref=e1075]:
                  - paragraph [ref=e1076]: Problem Frame
                  - generic [ref=e1077]:
                    - paragraph [ref=e1078]: The organization needs to replace manual, email-based invoice delivery, payment collection, and support handling with a branded client portal. The portal must allow client companies to securely access invoice history, download QuickBooks-derived PDFs, pay outstanding invoices through Stripe-hosted checkout, and manage support tickets with threaded communication and notifications. QuickBooks Online must remain the financial source of truth, while the portal manages client contacts, roles, authentication, and support workflows.
