            - generic [ref=e991]:
              - generic [ref=e993]:
                - paragraph [ref=e994]: We need a client-facing portal where customers can view their invoice history, download PDFs, pay outstanding invoices via Stripe, and raise support tickets. Right now everything goes through email and the team spends about 8 hours a week manually sending PDFs and chasing payments. We have about 200 active clients. The data lives in QuickBooks.
                - paragraph [ref=e995]: 04:09 am
              - generic [ref=e997]:
                - paragraph [ref=e998]: We use QuickBooks Online. The portal should generate PDFs from QuickBooks data. Stripe payments should create records in QuickBooks automatically. Clients are companies with multiple contacts — the primary contact pays invoices, others can only view. Authentication via magic link (no passwords). No existing helpdesk — build ticket management into the portal. Tickets need status tracking, threaded replies, and email notifications. No partial payments for now. White-label with our branding and domain. PCI compliance required. Send automated reminders 7 and 3 days before due date.
                - paragraph [ref=e999]: 04:15 am
              - generic [ref=e1001]:
                - paragraph [ref=e1002]: "1. Source of truth is QuickBooks — we import invoices and client data from QBO into the portal on a nightly sync. Client contacts and roles are managed in the portal but QBO is the master for financial data. Payments made in the portal write back to QBO via API. 2. Stripe-hosted checkout pages only — card data must never touch our servers. Redirect flow is fine. 3. For staff at launch: shared inbox with status tracking, threaded replies, and agent assignment. Internal notes and priority tags are needed. SLAs and reporting can wait for v2."
                - paragraph [ref=e1003]: 04:17 am
